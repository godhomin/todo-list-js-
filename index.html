<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>나의 할일 목록</title>
  //rel파일의 종류를 저장하는 것이고, href는 파일의 주소정보를 저장
  <link rel="stylesheet" href="style.css" /> 
  
</head>
<body>

  <h1>📝 나의 할일 목록</h1>
 
  <input type="text" id="todoInput" placeholder="할일을 입력하세요" />
  <button onclick="addTodo()">추가하기</button>
  // 할일 목록이 들어갈 빈공간 생성
  <ul id="todoList"></ul>
  // js파일을 연결
  <script src="script.js"></script>
</body>
</html>
